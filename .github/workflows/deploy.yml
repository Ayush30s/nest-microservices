name: Deploy to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm exec prisma generate --schema apps/auth-service/prisma/schema.prisma
          pnpm exec prisma generate --schema apps/user-service/prisma/schema.prisma
          pnpm exec prisma generate --schema apps/gym-service/prisma/schema.prisma

      - name: Build all services
        run: |
          pnpm exec nest build api-gateway
          pnpm exec nest build auth-service
          pnpm exec nest build gym-service
          pnpm exec nest build product-service
          pnpm exec nest build user-service
          pnpm exec nest build realtime-service
          pnpm exec nest build email-service

      # ✅ FIX: Write SSH key BEFORE ssh-keyscan so the key exists when needed
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          chmod 700 ~/.ssh

      # ✅ FIX: Use -o StrictHostKeyChecking=no as fallback, with timeout flags
      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -t rsa,ecdsa,ed25519 -T 30 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Copy dist to EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/app"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/dist/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            package.json \
            pnpm-lock.yaml \
            ecosystem.config.js \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            apps/auth-service/prisma/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/apps/auth-service/prisma/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            apps/user-service/prisma/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/apps/user-service/prisma/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            apps/gym-service/prisma/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/apps/gym-service/prisma/

          # ✅ NEW: Copy email-service app files to EC2
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            apps/email-service/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/apps/email-service/

      - name: Install production deps & restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd ~/app

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pnpm install --no-frozen-lockfile

            pnpm exec prisma generate --schema apps/auth-service/prisma/schema.prisma
            pnpm exec prisma generate --schema apps/user-service/prisma/schema.prisma
            pnpm exec prisma generate --schema apps/gym-service/prisma/schema.prisma

            pm2 delete all || true
            pm2 start ecosystem.config.js
            pm2 save
            pm2 list