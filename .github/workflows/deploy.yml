name: Deploy to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm exec prisma generate --schema apps/auth-service/prisma/schema.prisma
          pnpm exec prisma generate --schema apps/user-service/prisma/schema.prisma
          pnpm exec prisma generate --schema apps/gym-service/prisma/schema.prisma

      - name: Build services
        run: |
          pnpm exec nest build api-gateway
          pnpm exec nest build auth-service
          pnpm exec nest build gym-service
          pnpm exec nest build product-service
          pnpm exec nest build user-service

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            if [ ! -d ~/app ]; then
              git clone https://github.com/Ayush30s/nest-microservices.git ~/app
            fi

            cd ~/app
            git fetch origin
            git reset --hard origin/master

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pnpm install --no-frozen-lockfile

            pnpm exec prisma generate --schema apps/auth-service/prisma/schema.prisma
            pnpm exec prisma generate --schema apps/user-service/prisma/schema.prisma
            pnpm exec prisma generate --schema apps/gym-service/prisma/schema.prisma

            pnpm exec nest build api-gateway
            pnpm exec nest build auth-service
            pnpm exec nest build gym-service
            pnpm exec nest build product-service
            pnpm exec nest build user-service

            pm2 delete all || true
            pm2 start ecosystem.config.js
            pm2 save